<!doctype html>
<html><head><meta charset="utf-8">
<title>Logo lockup</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;padding:0;background:var(--ypz-paper);font-family:var(--ypz-font-body)}
  .card{display:flex;align-items:center;gap:32px;padding:28px 32px;height:200px;box-sizing:border-box}
  .lockup{flex:0 0 auto}
  .meta{display:flex;flex-direction:column;gap:6px;flex:1;border-left:1px solid var(--ypz-steel-200);padding-left:24px}
  .meta .row{display:flex;justify-content:space-between;align-items:baseline;gap:24px;font-size:11px}
  .meta .k{font-family:var(--ypz-font-mono);text-transform:uppercase;letter-spacing:.08em;color:var(--ypz-ink-3)}
  .meta .v{font-family:var(--ypz-font-mono);color:var(--ypz-ink)}
</style></head>
<body><div class="card">
  <img class="lockup" src="../assets/logo-lockup.svg" width="320" height="80" alt="">
  <div class="meta">
    <div class="row"><span class="k">FILE</span><span class="v">assets/logo-lockup.svg</span></div>
    <div class="row"><span class="k">MIN&nbsp;WIDTH</span><span class="v">240 px</span></div>
    <div class="row"><span class="k">CLEAR&nbsp;SPACE</span><span class="v">= cap height of "Y"</span></div>
    <div class="row"><span class="k">USE</span><span class="v">primary brand surfaces</span></div>
    <div class="row"><span class="k">SERIAL</span><span class="v">YPZ-LOGO-001</span></div>
  </div>
</div></body></html>
