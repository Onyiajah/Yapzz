<!doctype html>
<html><head><meta charset="utf-8">
<title>Radii</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;padding:0;background:var(--ypz-paper);font-family:var(--ypz-font-body)}
  .grid{display:grid;grid-template-columns:repeat(4,1fr);gap:0;border:1px solid var(--ypz-steel-200);height:170px}
  .cell{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;padding:14px;border-right:1px solid var(--ypz-steel-200);background:var(--ypz-paper)}
  .cell:last-child{border-right:0}
  .shape{width:64px;height:64px;background:#0E0F11;border:1px solid var(--ypz-ink)}
  .shape.r1{border-radius:2px}
  .shape.r2{border-radius:4px}
  .shape.pill{width:80px;height:32px;border-radius:999px}
  .name{font-family:'Space Grotesk',sans-serif;font-weight:600;font-size:13px;color:var(--ypz-ink)}
  .spec{font-family:var(--ypz-font-mono);font-size:10px;color:var(--ypz-ink-3);letter-spacing:.06em;text-align:center;line-height:1.4}
</style></head>
<body><div class="grid">
  <div class="cell"><div class="shape"></div><div><div class="name">Sharp · 0px</div><div class="spec">tables · cells<br>fields · stamps</div></div></div>
  <div class="cell"><div class="shape r1"></div><div><div class="name">Soft · 2px</div><div class="spec">cards · panels<br>document surface</div></div></div>
  <div class="cell"><div class="shape r2"></div><div><div class="name">Button · 4px</div><div class="spec">buttons only</div></div></div>
  <div class="cell"><div class="shape pill"></div><div><div class="name">Pill · 999px</div><div class="spec">chips · badges<br>avatars</div></div></div>
</div></body></html>
