<!doctype html>
<html><head><meta charset="utf-8">
<title>Steel grays</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;padding:0;background:var(--ypz-paper);font-family:var(--ypz-font-body)}
  .row{display:grid;grid-template-columns:repeat(7,1fr);gap:0;border:1px solid var(--ypz-steel-200);height:140px}
  .sw{padding:12px;display:flex;flex-direction:column;justify-content:space-between;border-right:1px solid var(--ypz-steel-200);font-family:var(--ypz-font-mono);font-size:10px}
  .sw:last-child{border-right:0}
  .sw .step{letter-spacing:.08em;text-transform:uppercase;opacity:.65}
  .sw .hex{font-size:11px}
</style></head>
<body><div class="row">
  <div class="sw" style="background:#F5F4F1;color:#0E0F11"><div class="step">50</div><div class="hex">#F5F4F1</div></div>
  <div class="sw" style="background:#E7E4DD;color:#0E0F11"><div class="step">100</div><div class="hex">#E7E4DD</div></div>
  <div class="sw" style="background:#D2CEC4;color:#0E0F11"><div class="step">200</div><div class="hex">#D2CEC4</div></div>
  <div class="sw" style="background:#B5B0A4;color:#0E0F11"><div class="step">300</div><div class="hex">#B5B0A4</div></div>
  <div class="sw" style="background:#8E8A80;color:#fff"><div class="step">400</div><div class="hex">#8E8A80</div></div>
  <div class="sw" style="background:#6B6860;color:#fff"><div class="step">500</div><div class="hex">#6B6860</div></div>
  <div class="sw" style="background:#2E2D29;color:#FAF7F2"><div class="step">700</div><div class="hex">#2E2D29</div></div>
</div></body></html>
