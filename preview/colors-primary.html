<!doctype html>
<html><head><meta charset="utf-8">
<title>Primary palette</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;padding:0;background:var(--ypz-paper);font-family:var(--ypz-font-body)}
  .row{display:grid;grid-template-columns:repeat(4,1fr);gap:0;border:1px solid var(--ypz-steel-200);height:170px}
  .sw{padding:14px 16px;display:flex;flex-direction:column;justify-content:space-between;border-right:1px solid var(--ypz-steel-200);position:relative}
  .sw:last-child{border-right:0}
  .sw .name{font-family:var(--ypz-font-display);font-weight:600;font-size:14px}
  .sw .hex{font-family:var(--ypz-font-mono);font-size:11px}
  .sw .ix{font-family:var(--ypz-font-mono);font-size:10px;letter-spacing:.08em;text-transform:uppercase;opacity:.7}
  .sw.orange{background:#F27F0D;color:#fff}
  .sw.ink{background:#0E0F11;color:#FAF7F2}
  .sw.paper{background:#FAF7F2;color:#0E0F11}
  .sw.white{background:#FFFFFF;color:#0E0F11}
  .sw.white::after{content:"";position:absolute;inset:0;border:1px dashed var(--ypz-steel-200);pointer-events:none}
</style></head>
<body><div class="row">
  <div class="sw orange"><div class="ix">01 · BRAND</div><div><div class="name">Signal Orange</div><div class="hex">#F27F0D</div></div></div>
  <div class="sw ink"><div class="ix">02 · TYPE</div><div><div class="name">Ink</div><div class="hex">#0E0F11</div></div></div>
  <div class="sw paper"><div class="ix">03 · SURFACE</div><div><div class="name">Paper</div><div class="hex">#FAF7F2</div></div></div>
  <div class="sw white"><div class="ix">04 · CARD</div><div><div class="name">White</div><div class="hex">#FFFFFF</div></div></div>
</div></body></html>
