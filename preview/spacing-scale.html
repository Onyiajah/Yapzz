<!doctype html>
<html><head><meta charset="utf-8">
<title>Spacing scale</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;padding:0;background:var(--ypz-paper);font-family:var(--ypz-font-body);color:var(--ypz-ink)}
  .card{padding:24px 28px;display:flex;flex-direction:column;gap:8px}
  .label{font-family:var(--ypz-font-mono);font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:var(--ypz-ink-3)}
  .row{display:flex;align-items:center;gap:16px;font-family:'IBM Plex Mono',monospace;font-size:11px;color:var(--ypz-ink-3)}
  .name{width:36px;color:var(--ypz-ink)}
  .px{width:42px;text-align:right}
  .bar{height:14px;background:var(--ypz-orange);border-right:2px solid var(--ypz-ink)}
</style></head>
<body><div class="card">
  <div class="label">spacing · 4px base · use as gap, padding, margin</div>
  <div class="row"><div class="name">1</div><div class="px">4 px</div><div class="bar" style="width:4px"></div></div>
  <div class="row"><div class="name">2</div><div class="px">8 px</div><div class="bar" style="width:8px"></div></div>
  <div class="row"><div class="name">3</div><div class="px">12 px</div><div class="bar" style="width:12px"></div></div>
  <div class="row"><div class="name">4</div><div class="px">16 px</div><div class="bar" style="width:16px"></div></div>
  <div class="row"><div class="name">6</div><div class="px">24 px</div><div class="bar" style="width:24px"></div></div>
  <div class="row"><div class="name">8</div><div class="px">32 px</div><div class="bar" style="width:32px"></div></div>
  <div class="row"><div class="name">12</div><div class="px">48 px</div><div class="bar" style="width:48px"></div></div>
  <div class="row"><div class="name">16</div><div class="px">64 px</div><div class="bar" style="width:64px"></div></div>
  <div class="row"><div class="name">24</div><div class="px">96 px</div><div class="bar" style="width:96px"></div></div>
</div></body></html>
