<!doctype html>
<html><head><meta charset="utf-8">
<title>Tagline</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;padding:0;background:var(--ypz-paper);font-family:var(--ypz-font-body);color:var(--ypz-ink)}
  .card{padding:36px 40px;height:200px;box-sizing:border-box;display:flex;flex-direction:column;justify-content:center;gap:18px;position:relative;overflow:hidden}
  .crosshair{position:absolute;width:14px;height:14px;opacity:.35}
  .crosshair.tl{top:10px;left:10px} .crosshair.tr{top:10px;right:10px}
  .crosshair.bl{bottom:10px;left:10px} .crosshair.br{bottom:10px;right:10px}
  .word{font-family:var(--ypz-font-display);font-size:64px;font-weight:600;letter-spacing:-.02em;line-height:1;color:var(--ypz-ink);display:flex;align-items:baseline;gap:.4em}
  .dot{display:inline-block;width:.18em;height:.18em;background:var(--ypz-orange);border-radius:50%;transform:translateY(-.2em)}
  .meta{font-family:var(--ypz-font-mono);font-size:11px;letter-spacing:.18em;text-transform:uppercase;color:var(--ypz-ink-3)}
</style></head>
<body><div class="card">
  <img class="crosshair tl" src="../assets/crosshair.svg"><img class="crosshair tr" src="../assets/crosshair.svg">
  <img class="crosshair bl" src="../assets/crosshair.svg"><img class="crosshair br" src="../assets/crosshair.svg">
  <div class="word">Track<span class="dot"></span>Control<span class="dot"></span>Comply</div>
  <div class="meta">YapzZ — Compliance-Control Infrastructure · Patent Pending</div>
</div></body></html>
