<!doctype html>
<html><head><meta charset="utf-8">
<title>Table row</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;padding:0;background:var(--ypz-paper);font-family:var(--ypz-font-body);color:var(--ypz-ink)}
  table{width:100%;border-collapse:collapse;background:#fff;font-family:'IBM Plex Mono',monospace;font-size:12px}
  thead th{background:var(--ypz-paper-2);text-align:left;font-family:'Space Grotesk';font-weight:600;font-size:10px;letter-spacing:.08em;text-transform:uppercase;color:var(--ypz-ink-2);padding:8px 12px;border-bottom:1px solid var(--ypz-ink);height:30px}
  tbody td{padding:8px 12px;border-bottom:1px solid var(--ypz-steel-100);height:30px;color:var(--ypz-ink)}
  tbody tr:hover td{background:var(--ypz-paper)}
  tbody tr.active td{background:#FFF4E4;border-left:0;box-shadow:inset 4px 0 0 0 var(--ypz-orange)}
  tbody tr.active td:first-child{padding-left:14px}
  .chip{font-family:'Space Grotesk';font-weight:600;font-size:10px;letter-spacing:.06em;padding:2px 8px;border-radius:999px;display:inline-flex;align-items:center;gap:5px;line-height:1.4}
  .chip .d{width:5px;height:5px;border-radius:50%}
  .chip.appr{background:#DCEFE3;color:#155A3B}.chip.appr .d{background:#1F8A5B}
  .chip.blk{background:#F6DDD8;color:#7A1E10}.chip.blk .d{background:#C8321F}
  .chip.pen{background:#FBEFCB;color:#5C4108}.chip.pen .d{background:#E0A815}
</style></head>
<body>
<table>
<thead><tr><th>Transfer</th><th>Quantity</th><th>Custodian</th><th>Status</th><th style="text-align:right">Sealed</th></tr></thead>
<tbody>
  <tr class="active"><td>T-8821-04A</td><td>2.450 kg</td><td>OP-04823</td><td><span class="chip pen"><span class="d"></span>PENDING</span></td><td style="text-align:right">—</td></tr>
  <tr><td>T-8820-13B</td><td>0.180 kg</td><td>OP-04701</td><td><span class="chip appr"><span class="d"></span>APPROVED</span></td><td style="text-align:right">14:28 UTC</td></tr>
  <tr><td>T-8819-02C</td><td>5.000 kg</td><td>OP-03388</td><td><span class="chip blk"><span class="d"></span>BLOCKED</span></td><td style="text-align:right">—</td></tr>
  <tr><td>T-8818-09A</td><td>0.045 kg</td><td>OP-04823</td><td><span class="chip appr"><span class="d"></span>APPROVED</span></td><td style="text-align:right">12:11 UTC</td></tr>
</tbody>
</table>
</body></html>
