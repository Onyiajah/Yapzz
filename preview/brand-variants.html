<!doctype html>
<html><head><meta charset="utf-8">
<title>Logo variants</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;padding:0;background:var(--ypz-paper);font-family:var(--ypz-font-body)}
  .grid{display:grid;grid-template-columns:repeat(3,1fr);gap:1px;background:var(--ypz-steel-200);border:1px solid var(--ypz-steel-200)}
  .cell{background:var(--ypz-paper);display:flex;flex-direction:column;align-items:center;justify-content:center;padding:28px 16px 18px;gap:14px;min-height:160px}
  .cell.dark{background:#0E0F11}
  .cell.orange{background:#F27F0D}
  .cap{font-family:var(--ypz-font-mono);font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:var(--ypz-ink-3)}
  .cell.dark .cap, .cell.orange .cap{color:rgba(255,255,255,.7)}
</style></head>
<body><div class="grid">
  <div class="cell">
    <img src="../assets/logo-mark.svg" width="64" height="64" alt="">
    <div class="cap">mark · on paper</div>
  </div>
  <div class="cell">
    <img src="../assets/logo-wordmark.svg" width="200" height="54" alt="">
    <div class="cap">wordmark · on paper</div>
  </div>
  <div class="cell dark">
    <img src="../assets/logo-mark.svg" width="64" height="64" alt="" style="filter:invert(1)">
    <div class="cap">mark · inverted</div>
  </div>
</div></body></html>
