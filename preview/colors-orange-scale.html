<!doctype html>
<html><head><meta charset="utf-8">
<title>Orange scale</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;padding:0;background:var(--ypz-paper);font-family:var(--ypz-font-body)}
  .row{display:grid;grid-template-columns:repeat(6,1fr);gap:0;border:1px solid var(--ypz-steel-200);height:140px}
  .sw{padding:12px;display:flex;flex-direction:column;justify-content:space-between;border-right:1px solid var(--ypz-steel-200);font-family:var(--ypz-font-mono);font-size:10px}
  .sw:last-child{border-right:0}
  .sw .step{letter-spacing:.08em;text-transform:uppercase;opacity:.65}
  .sw .hex{font-size:11px}
</style></head>
<body><div class="row">
  <div class="sw" style="background:#FFF4E4;color:#0E0F11"><div class="step">50</div><div class="hex">#FFF4E4</div></div>
  <div class="sw" style="background:#FFE4C4;color:#0E0F11"><div class="step">100</div><div class="hex">#FFE4C4</div></div>
  <div class="sw" style="background:#FFB36A;color:#0E0F11"><div class="step">300</div><div class="hex">#FFB36A</div></div>
  <div class="sw" style="background:#F27F0D;color:#fff"><div class="step">500 · BRAND</div><div class="hex">#F27F0D</div></div>
  <div class="sw" style="background:#D86E07;color:#fff"><div class="step">600 · HOVER</div><div class="hex">#D86E07</div></div>
  <div class="sw" style="background:#B95C04;color:#fff"><div class="step">700 · PRESS</div><div class="hex">#B95C04</div></div>
</div></body></html>
