<!doctype html>
<html><head><meta charset="utf-8">
<title>Labels & stamps</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;padding:0;background:var(--ypz-paper);font-family:var(--ypz-font-body);color:var(--ypz-ink)}
  .card{padding:24px 28px;display:flex;flex-direction:column;gap:18px}
  .meta{font-family:var(--ypz-font-mono);font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:var(--ypz-ink-3)}
  .row{display:flex;align-items:center;gap:14px;flex-wrap:wrap}
  .label{font-family:'Space Grotesk';font-weight:600;font-size:11px;letter-spacing:.08em;text-transform:uppercase;color:var(--ypz-ink-2)}
  .stamp{font-family:'Space Grotesk';font-weight:700;font-size:13px;letter-spacing:.14em;text-transform:uppercase;padding:6px 10px;color:#fff}
  .stamp.box{border:2px solid currentColor;background:transparent;color:var(--ypz-orange);transform:rotate(-3deg)}
  .stamp.box.green{color:#1F8A5B}
  .stamp.box.red{color:#C8321F}
  .stamp.box.purple{color:#4A2A8E}
  .eyebrow{font-family:'Space Grotesk';font-weight:600;font-size:12px;letter-spacing:.1em;text-transform:uppercase;color:var(--ypz-orange);display:inline-flex;align-items:center;gap:8px}
  .eyebrow::before{content:"";width:18px;height:2px;background:var(--ypz-orange)}
</style></head>
<body><div class="card">
  <div class="meta">labels · ALL CAPS · tracked +0.08em</div>
  <div class="row">
    <span class="label">Serial</span>
    <span class="label">Custodian</span>
    <span class="label">Jurisdiction</span>
    <span class="label">Last Sealed</span>
  </div>
  <div class="meta">stamps · enforcement marks</div>
  <div class="row">
    <span class="stamp box green">APPROVED</span>
    <span class="stamp box red">BLOCKED</span>
    <span class="stamp box purple">SEALED</span>
    <span class="stamp box">PENDING</span>
  </div>
  <div class="meta">eyebrow · section opener</div>
  <div class="row"><span class="eyebrow">Compliance Console</span></div>
</div></body></html>
