<!doctype html>
<html><head><meta charset="utf-8">
<title>Status colors</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;padding:0;background:var(--ypz-paper);font-family:var(--ypz-font-body);color:var(--ypz-ink)}
  .grid{display:grid;grid-template-columns:repeat(5,1fr);gap:0;border:1px solid var(--ypz-steel-200);height:200px}
  .cell{padding:14px;display:flex;flex-direction:column;justify-content:space-between;border-right:1px solid var(--ypz-steel-200);background:#FFFFFF;position:relative}
  .cell:last-child{border-right:0}
  .swatch{height:54px;display:flex;align-items:center;justify-content:center;color:#fff;font-family:var(--ypz-font-display);font-weight:700;letter-spacing:.12em;font-size:13px}
  .name{font-family:var(--ypz-font-display);font-weight:600;font-size:13px;margin-top:8px}
  .hex{font-family:var(--ypz-font-mono);font-size:10px;color:var(--ypz-ink-3)}
  .stamp{font-family:var(--ypz-font-display);font-weight:700;letter-spacing:.14em;font-size:10px;color:#fff;padding:2px 6px;align-self:flex-start}
</style></head>
<body><div class="grid">
  <div class="cell"><div class="swatch" style="background:#1F8A5B">APPROVED</div><div><div class="name">Approved</div><div class="hex">#1F8A5B · status.approved</div></div></div>
  <div class="cell"><div class="swatch" style="background:#C8321F">BLOCKED</div><div><div class="name">Blocked</div><div class="hex">#C8321F · status.blocked</div></div></div>
  <div class="cell"><div class="swatch" style="background:#E0A815;color:#0E0F11">WARNING</div><div><div class="name">Warning</div><div class="hex">#E0A815 · status.warning</div></div></div>
  <div class="cell"><div class="swatch" style="background:#2A5FB8">INFO</div><div><div class="name">Info</div><div class="hex">#2A5FB8 · status.info</div></div></div>
  <div class="cell"><div class="swatch" style="background:#4A2A8E">SEALED</div><div><div class="name">Sealed</div><div class="hex">#4A2A8E · immutable</div></div></div>
</div></body></html>
