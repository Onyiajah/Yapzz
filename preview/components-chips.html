<!doctype html>
<html><head><meta charset="utf-8">
<title>Chips & badges</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;padding:0;background:var(--ypz-paper);font-family:var(--ypz-font-body);color:var(--ypz-ink)}
  .card{padding:22px 28px;display:flex;flex-direction:column;gap:14px}
  .meta{font-family:var(--ypz-font-mono);font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:var(--ypz-ink-3)}
  .row{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
  .chip{font-family:'Space Grotesk';font-weight:600;font-size:11px;letter-spacing:.06em;padding:4px 10px;border-radius:999px;display:inline-flex;align-items:center;gap:6px;line-height:1}
  .chip .dot{width:6px;height:6px;border-radius:50%}
  .chip.approved{background:#DCEFE3;color:#155A3B}
  .chip.approved .dot{background:#1F8A5B}
  .chip.blocked{background:#F6DDD8;color:#7A1E10}
  .chip.blocked .dot{background:#C8321F}
  .chip.warn{background:#FBEFCB;color:#5C4108}
  .chip.warn .dot{background:#E0A815}
  .chip.info{background:#DCE6F4;color:#1A3A78}
  .chip.info .dot{background:#2A5FB8}
  .chip.sealed{background:#E5DEF1;color:#2D1859}
  .chip.sealed .dot{background:#4A2A8E}
  .chip.neutral{background:#E7E4DD;color:#2E2D29}
  .chip.neutral .dot{background:#6B6860}
  .tag{font-family:'IBM Plex Mono',monospace;font-size:11px;padding:3px 8px;border:1px solid var(--ypz-steel-300);background:#fff;color:var(--ypz-ink-2);border-radius:0}
</style></head>
<body><div class="card">
  <div class="meta">status chips</div>
  <div class="row">
    <span class="chip approved"><span class="dot"></span>APPROVED</span>
    <span class="chip blocked"><span class="dot"></span>BLOCKED</span>
    <span class="chip warn"><span class="dot"></span>PENDING</span>
    <span class="chip info"><span class="dot"></span>IN TRANSIT</span>
    <span class="chip sealed"><span class="dot"></span>SEALED</span>
    <span class="chip neutral"><span class="dot"></span>DRAFT</span>
  </div>
  <div class="meta">metadata tags · monospace</div>
  <div class="row">
    <span class="tag">T-8821-04A</span>
    <span class="tag">2.450 kg</span>
    <span class="tag">JUR · US-NM</span>
    <span class="tag">§ R-114.2(a)</span>
    <span class="tag">REV 2026.04</span>
  </div>
</div></body></html>
