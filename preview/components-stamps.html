<!doctype html>
<html><head><meta charset="utf-8">
<title>Stamps</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;padding:0;background:var(--ypz-paper);font-family:var(--ypz-font-body);color:var(--ypz-ink)}
  .card{padding:32px 28px;display:flex;align-items:center;justify-content:space-around;gap:18px;flex-wrap:wrap;height:200px;box-sizing:border-box}
  .stamp{font-family:'Space Grotesk';font-weight:700;font-size:14px;letter-spacing:.18em;text-transform:uppercase;padding:10px 14px;border:3px solid currentColor;color:var(--ypz-orange);position:relative;display:inline-flex;flex-direction:column;align-items:center;gap:2px;line-height:1.1}
  .stamp .sub{font-family:'IBM Plex Mono',monospace;font-size:9px;letter-spacing:.1em;font-weight:500;opacity:.85}
  .stamp.green{color:#1F8A5B}
  .stamp.red{color:#C8321F}
  .stamp.purple{color:#4A2A8E}
  .s-rotate{transform:rotate(-4deg)}
  .s-rotate2{transform:rotate(3deg)}
  .s-rotate3{transform:rotate(-2deg)}
</style></head>
<body><div class="card">
  <div class="stamp green s-rotate">APPROVED<span class="sub">2026·05·09 · OP-04823</span></div>
  <div class="stamp red s-rotate2">BLOCKED<span class="sub">§ R-114.2(a)</span></div>
  <div class="stamp purple s-rotate3">SEALED<span class="sub">0x9f2c·…·a014</span></div>
  <div class="stamp s-rotate">PENDING<span class="sub">DUAL APPROVAL</span></div>
</div></body></html>
