<!doctype html>
<html><head><meta charset="utf-8">
<title>Mono type</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;padding:0;background:var(--ypz-paper);font-family:var(--ypz-font-body);color:var(--ypz-ink)}
  .card{padding:24px 28px;display:flex;flex-direction:column;gap:10px}
  .label{font-family:var(--ypz-font-mono);font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:var(--ypz-ink-3)}
  .row{display:flex;align-items:center;gap:14px;font-family:'IBM Plex Mono',monospace;font-size:13px;border-bottom:1px solid var(--ypz-steel-100);padding-bottom:8px}
  .row:last-child{border-bottom:0}
  .k{width:90px;font-size:10px;letter-spacing:.08em;text-transform:uppercase;color:var(--ypz-ink-3)}
  .v{color:var(--ypz-ink)}
  .v.amt{font-weight:500}
</style></head>
<body><div class="card">
  <div class="label">IBM Plex Mono · IDs · timestamps · hashes</div>
  <div class="row"><div class="k">TRANSFER</div><div class="v">T-8821-04A</div></div>
  <div class="row"><div class="k">SEAL HASH</div><div class="v">0x9f2c·7e41·a9e2·4014</div></div>
  <div class="row"><div class="k">TIMESTAMP</div><div class="v">2026-05-09 14:32:08 UTC</div></div>
  <div class="row"><div class="k">QUANTITY</div><div class="v amt">2.450 kg <span style="color:var(--ypz-ink-3)">·</span> ±0.002</div></div>
  <div class="row"><div class="k">RULE</div><div class="v">§ R-114.2(a) · dual-approval ≥ 500g</div></div>
</div></body></html>
