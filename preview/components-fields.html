<!doctype html>
<html><head><meta charset="utf-8">
<title>Form fields</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;padding:0;background:var(--ypz-paper);font-family:var(--ypz-font-body);color:var(--ypz-ink)}
  .card{padding:22px 28px;display:flex;flex-direction:column;gap:14px}
  .field{display:flex;flex-direction:column;gap:4px}
  .row{display:grid;grid-template-columns:1fr 1fr;gap:18px}
  .label{font-family:'Space Grotesk';font-weight:600;font-size:11px;letter-spacing:.08em;text-transform:uppercase;color:var(--ypz-ink-2);display:flex;justify-content:space-between}
  .label .req{color:var(--ypz-orange);font-weight:700}
  .input{font-family:'IBM Plex Mono',monospace;font-size:13px;height:34px;padding:0 12px;border:1px solid var(--ypz-steel-300);background:#fff;color:var(--ypz-ink);border-radius:0;outline:none}
  .input:focus{border-color:var(--ypz-ink);box-shadow:inset 0 0 0 1px var(--ypz-ink)}
  .input.error{border-color:#C8321F;box-shadow:inset 0 0 0 1px #C8321F}
  .help{font-family:'IBM Plex Mono',monospace;font-size:10px;color:var(--ypz-ink-3);letter-spacing:.04em}
  .help.error{color:#C8321F}
  .help.error::before{content:"§ ";font-weight:700}
</style></head>
<body><div class="card">
  <div class="row">
    <div class="field">
      <div class="label"><span>Custodian ID</span><span class="req">REQ</span></div>
      <input class="input" value="OP-04823">
      <div class="help">Operator currently signed in</div>
    </div>
    <div class="field">
      <div class="label"><span>Quantity</span><span class="req">REQ</span></div>
      <input class="input error" value="2.450">
      <div class="help error">R-114.2(a) · dual-approval needed ≥ 0.500 kg</div>
    </div>
  </div>
  <div class="row">
    <div class="field">
      <div class="label"><span>Jurisdiction</span></div>
      <input class="input" value="US-NM-Doña Ana ▾" readonly>
      <div class="help">Auto-detected from facility</div>
    </div>
    <div class="field">
      <div class="label"><span>Seal note</span></div>
      <input class="input" placeholder="optional · max 240 chars">
      <div class="help">Appended to immutable record</div>
    </div>
  </div>
</div></body></html>
