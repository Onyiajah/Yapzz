<!doctype html>
<html><head><meta charset="utf-8">
<title>Display type</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;padding:0;background:var(--ypz-paper);font-family:var(--ypz-font-body);color:var(--ypz-ink)}
  .card{padding:24px 28px;display:flex;flex-direction:column;gap:14px}
  .label{font-family:var(--ypz-font-mono);font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:var(--ypz-ink-3)}
  .row{display:flex;align-items:baseline;gap:18px;border-bottom:1px solid var(--ypz-steel-100);padding-bottom:8px}
  .row:last-child{border-bottom:0}
  .spec{font-family:var(--ypz-font-mono);font-size:10px;color:var(--ypz-ink-3);width:90px;flex-shrink:0;letter-spacing:.06em}
  .sample{font-family:'Space Grotesk',sans-serif;color:var(--ypz-ink);line-height:1}
</style></head>
<body><div class="card">
  <div class="label">Space Grotesk · display + UI</div>
  <div class="row"><div class="spec">D1 · 64/500</div><div class="sample" style="font-size:64px;font-weight:500;letter-spacing:-.02em">Track. Control.</div></div>
  <div class="row"><div class="spec">D3 · 48/600</div><div class="sample" style="font-size:48px;font-weight:600;letter-spacing:-.015em">Compliance, sealed</div></div>
  <div class="row"><div class="spec">H1 · 36/600</div><div class="sample" style="font-size:36px;font-weight:600">Pending Approvals</div></div>
  <div class="row"><div class="spec">H2 · 28/600</div><div class="sample" style="font-size:28px;font-weight:600">Chain of Custody</div></div>
</div></body></html>
