<!doctype html>
<html><head><meta charset="utf-8">
<title>Iconography</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;padding:0;background:var(--ypz-paper);font-family:var(--ypz-font-body);color:var(--ypz-ink)}
  .grid{display:grid;grid-template-columns:repeat(5,1fr);gap:0;border:1px solid var(--ypz-steel-200);height:170px}
  .cell{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px;padding:14px;border-right:1px solid var(--ypz-steel-200);background:var(--ypz-paper)}
  .cell:last-child{border-right:0}
  .icon{width:32px;height:32px;color:var(--ypz-ink)}
  .name{font-family:'Space Grotesk';font-weight:600;font-size:11px;letter-spacing:.06em;text-transform:uppercase;color:var(--ypz-ink-2)}
  .src{font-family:'IBM Plex Mono',monospace;font-size:9px;color:var(--ypz-ink-3)}
</style></head>
<body><div class="grid">
  <div class="cell"><img src="../assets/icons/seal.svg" class="icon"><div class="name">Seal</div><div class="src">custom</div></div>
  <div class="cell"><img src="../assets/icons/chain.svg" class="icon"><div class="name">Chain</div><div class="src">custom</div></div>
  <div class="cell"><img src="../assets/icons/gavel.svg" class="icon"><div class="name">Gavel</div><div class="src">custom</div></div>
  <div class="cell"><img src="../assets/icons/manifest.svg" class="icon"><div class="name">Manifest</div><div class="src">custom</div></div>
  <div class="cell"><img src="../assets/icons/vault.svg" class="icon"><div class="name">Vault</div><div class="src">custom</div></div>
</div></body></html>
